<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V7 - Mundo Gigante!</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center;
            background-color: #0a0a0a; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding-top: 10px; overflow: hidden;
        }
        #gameContainer { position: relative; margin-top: 10px; }
        #gameCanvas {
            background-color: #1a1a1a; border: 4px solid #333;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9); display: block;
        }
        
        /* UI y Pantallas */
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; z-index: 10;
        }
        #gameOverScreen { display: none; }
        .screen-overlay h2 { color: #ff4d4d; font-size: 4rem; margin: 0; text-transform: uppercase; letter-spacing: 5px;}
        .screen-overlay p { font-size: 1.5rem; margin: 15px 0; color: #ccc; }
        
        .btn {
            margin-top: 20px; padding: 15px 40px; font-size: 1.3rem; font-weight: bold;
            color: white; background-color: #4facf7; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { background-color: #2b8cd6; transform: scale(1.05); }
        .btn-start { background-color: #b30000; }
        .btn-start:hover { background-color: #ff1a1a; }

        /* HUD Superior */
        .header-stats {
            display: flex; gap: 40px; font-size: 1.3rem; background: #111;
            padding: 10px 30px; border-radius: 10px; border: 1px solid #333; align-items: center;
        }
        .time-text { color: #fff; font-weight: bold; font-size: 1.5rem; }
        .phase-text { color: #ff4d4d; font-weight: bold; letter-spacing: 2px; }

        /* Anuncio Central Épico */
        #announcement {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 3rem; font-weight: bold; color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 5;
            text-transform: uppercase; letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="header-stats">
        <span>Tiempo Restante: <span id="timeDisplay" class="time-text">2:00</span></span>
        <span>Estado: <span id="phaseDisplay" class="phase-text">FÁCIL</span></span>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="announcement"></div>

        <div id="startScreen" class="screen-overlay">
            <h2>Campaña 1</h2>
            <p>El Despertar. Sobrevive 2 minutos en las ruinas masivas.</p>
            <p><strong>Moverse:</strong> WASD o Flechas</p>
            <button class="btn btn-start" onclick="startGame()">INICIAR PESADILLA</button>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h2 id="endTitle">¡CAZADO!</h2>
            <p id="endDesc">No lograste sobrevivir el tiempo suficiente.</p>
            <button class="btn" onclick="location.reload()">Regresar al Menú</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timeEl = document.getElementById('timeDisplay');
        const phaseEl = document.getElementById('phaseDisplay');
        const announcementEl = document.getElementById('announcement');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const endTitle = document.getElementById('endTitle');
        const endDesc = document.getElementById('endDesc');

        // Dimensiones Gigantes del Mundo
        const WORLD_W = 3000;
        const WORLD_H = 3000;

        // Variables del Motor
        let player, beast, camera, keys, gameRunning;
        let obstacles = [];
        let bushes = [];
        
        // Sistema de Campaña y Tiempo
        let timeLeft = 120; // 2 minutos en segundos
        let lastTimeUpdate = 0;
        let currentPhaseIndex = 0;

        // Definición de las Fases para la Campaña 1
        const phases = [
            { name: "Fácil", timeTrigger: 120, bSpeed: 1.8, bSize: 20, bColor: '#777777', vRadius: 200 },
            { name: "Normal", timeTrigger: 60, bSpeed: 2.5, bSize: 30, bColor: '#cc0000', vRadius: 350 }
        ];

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Generador Procedural del Mundo Gigante
        function generateWorld() {
            obstacles = [];
            bushes = [];
            
            // Bordes del mundo
            obstacles.push({x: 0, y: 0, w: WORLD_W, h: 20});
            obstacles.push({x: 0, y: 0, w: 20, h: WORLD_H});
            obstacles.push({x: 0, y: WORLD_H - 20, w: WORLD_W, h: 20});
            obstacles.push({x: WORLD_W - 20, y: 0, w: 20, h: WORLD_H});

            // Ruinas aleatorias (150 muros)
            for(let i = 0; i < 150; i++) {
                let isHoriz = Math.random() > 0.5;
                let w = isHoriz ? (Math.random() * 300 + 100) : 30;
                let h = isHoriz ? 30 : (Math.random() * 300 + 100);
                let x = Math.random() * (WORLD_W - w - 40) + 20;
                let y = Math.random() * (WORLD_H - h - 40) + 20;
                
                // No poner muros cerca del spawn del jugador (centro)
                if (Math.abs(x - WORLD_W/2) > 200 || Math.abs(y - WORLD_H/2) > 200) {
                    obstacles.push({x, y, w, h});
                }
            }

            // Arbustos aleatorios (40 arbustos)
            for(let i = 0; i < 40; i++) {
                let w = Math.random() * 100 + 80;
                let h = Math.random() * 100 + 80;
                let x = Math.random() * (WORLD_W - w - 40) + 20;
                let y = Math.random() * (WORLD_H - h - 40) + 20;
                bushes.push({x, y, w, h});
            }
        }

        function initVars() {
            generateWorld();
            keys = {};
            gameRunning = true;
            timeLeft = 120; // 2 minutos
            lastTimeUpdate = Date.now();
            currentPhaseIndex = 0;

            // Jugador aparece en el centro del mundo gigante
            player = { x: WORLD_W/2, y: WORLD_H/2, size: 20, speed: 4.5, color: '#4facf7', isHidden: false };
            
            // La cámara inicia
            camera = { x: 0, y: 0, w: canvas.width, h: canvas.height };

            // La bestia aparece lejos
            beast = { 
                x: 100, y: 100, 
                size: phases[0].bSize, speed: phases[0].bSpeed, color: phases[0].bColor, 
                state: 'wander', visionRadius: phases[0].vRadius, wanderAngle: Math.random() * Math.PI * 2 
            };
            
            updateUI();
        }

        function isColliding(newX, newY, size) {
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x && newY < obs.y + obs.h && newY + size > obs.y) return true;
            }
            return false;
        }

        function hasLineOfSight(bx, by, px, py) {
            let dx = px - bx; let dy = py - by; let distance = Math.sqrt(dx*dx + dy*dy);
            let steps = distance / 10; 
            for (let i = 1; i < steps; i++) {
                let cx = bx + (dx * i / steps); let cy = by + (dy * i / steps);
                for (let obs of obstacles) {
                    if (cx >= obs.x && cx <= obs.x + obs.w && cy >= obs.y && cy <= obs.y + obs.h) return false;
                }
            }
            return true;
        }

        function showAnnouncement(text) {
            announcementEl.innerText = text;
            announcementEl.style.opacity = 1;
            // Efecto de temblor en la pantalla (muy de juego épico)
            document.body.style.transform = "translate(5px, 5px)";
            setTimeout(() => document.body.style.transform = "translate(-5px, -5px)", 50);
            setTimeout(() => document.body.style.transform = "translate(5px, -5px)", 100);
            setTimeout(() => document.body.style.transform = "translate(0, 0)", 150);
            
            setTimeout(() => { announcementEl.style.opacity = 0; }, 3000);
        }

        function checkPhaseEvolutions() {
            // Revisar si toca cambiar de fase según el tiempo
            if (currentPhaseIndex + 1 < phases.length) {
                let nextPhase = phases[currentPhaseIndex + 1];
                if (timeLeft <= nextPhase.timeTrigger) {
                    currentPhaseIndex++;
                    let p = phases[currentPhaseIndex];
                    
                    // Evolucionar Bestia
                    beast.speed = p.bSpeed;
                    beast.size = p.bSize;
                    beast.color = p.bColor;
                    beast.visionRadius = p.vRadius;
                    
                    // Actualizar UI
                    phaseEl.innerText = p.name;
                    if (p.name === "Normal") phaseEl.style.color = "#ff4d4d";
                    
                    showAnnouncement(`LA BESTIA EVOLUCIONA\nNIVEL: ${p.name}`);
                }
            }
        }

        function updateUI() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timeEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            if (timeLeft <= 10) timeEl.style.color = "#ff0000"; // Últimos 10 segundos en rojo
        }

        function update() {
            if (!gameRunning) return;

            // Sistema de Reloj (Baja 1 cada segundo real)
            let now = Date.now();
            if (now - lastTimeUpdate >= 1000) {
                timeLeft--;
                lastTimeUpdate = now;
                updateUI();
                checkPhaseEvolutions();

                // CONDICIÓN DE VICTORIA
                if (timeLeft <= 0) {
                    gameRunning = false;
                    endTitle.innerText = "¡SOBREVIVISTE!";
                    endTitle.style.color = "#4facf7";
                    endDesc.innerText = "Has superado la Campaña 1. El amanecer se acerca.";
                    gameOverScreen.style.display = 'flex';
                    return;
                }
            }

            // Movimiento del Jugador
            let nextX = player.x; let nextY = player.y;
            if (keys['arrowleft'] || keys['a']) nextX -= player.speed;
            if (keys['arrowright'] || keys['d']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;
            if (keys['arrowup'] || keys['w']) nextY -= player.speed;
            if (keys['arrowdown'] || keys['s']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            // Actualizar Cámara (Sigue al jugador, pero no se sale de los bordes del mundo)
            camera.x = player.x + player.size/2 - camera.w/2;
            camera.y = player.y + player.size/2 - camera.h/2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_W - camera.w));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_H - camera.h));

            // Arbustos
            player.isHidden = false;
            let pCenterX = player.x + player.size/2; let pCenterY = player.y + player.size/2;
            for (let b of bushes) {
                if (pCenterX > b.x && pCenterX < b.x + b.w && pCenterY > b.y && pCenterY < b.y + b.h) {
                    player.isHidden = true;
                }
            }

            // Inteligencia de la Bestia
            let bCenterX = beast.x + beast.size/2; let bCenterY = beast.y + beast.size/2;
            let dX = player.x - beast.x; let dY = player.y - beast.y;
            let dist = Math.sqrt(dX*dX + dY*dY);
            let canSee = dist < beast.visionRadius && !player.isHidden && hasLineOfSight(bCenterX, bCenterY, pCenterX, pCenterY);

            if (beast.state === 'wander') {
                if (canSee) beast.state = 'chase';
                else {
                    let moveX = Math.cos(beast.wanderAngle) * (beast.speed * 0.6);
                    let moveY = Math.sin(beast.wanderAngle) * (beast.speed * 0.6);
                    let hitWall = false;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX; else hitWall = true;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY; else hitWall = true;
                    if (hitWall || Math.random() < 0.01) beast.wanderAngle = Math.random() * Math.PI * 2;
                }
            } else if (beast.state === 'chase') {
                if (!canSee && dist > beast.visionRadius * 1.5) {
                    beast.state = 'wander'; beast.wanderAngle = Math.random() * Math.PI * 2;
                } else if (canSee) {
                    let moveX = (dX / dist) * beast.speed; let moveY = (dY / dist) * beast.speed;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY;
                }
            }

            // Game Over (Derrota)
            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                gameRunning = false;
                endTitle.innerText = "¡CAZADO!";
                endTitle.style.color = "#ff4d4d";
                endDesc.innerText = `Sobreviviste hasta la fase: ${phases[currentPhaseIndex].name}.`;
                gameOverScreen.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // MÚSICA MAESTRO: Renderizado relativo a la cámara
            // Para dibujar algo, le restamos la posición de la cámara (camera.x, camera.y)

            // Dibujar Suelo base del mundo visible
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0 - camera.x, 0 - camera.y, WORLD_W, WORLD_H);

            // Arbustos (Solo dibujamos si están dentro de la cámara para ahorrar rendimiento)
            ctx.fillStyle = '#104018'; 
            for (let b of bushes) {
                if (b.x + b.w > camera.x && b.x < camera.x + camera.w && b.y + b.h > camera.y && b.y < camera.y + camera.h) {
                    ctx.fillRect(b.x - camera.x, b.y - camera.y, b.w, b.h);
                }
            }

            // Muros
            ctx.fillStyle = '#444444';
            for (let obs of obstacles) {
                if (obs.x + obs.w > camera.x && obs.x < camera.x + camera.w && obs.y + obs.h > camera.y && obs.y < camera.y + camera.h) {
                    ctx.fillRect(obs.x - camera.x, obs.y - camera.y, obs.w, obs.h);
                }
            }

            // Jugador
            ctx.globalAlpha = player.isHidden ? 0.3 : 1.0;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - camera.x, player.y - camera.y, player.size, player.size);
            ctx.globalAlpha = 1.0;

            // Bestia (Cambia de color según estado)
            ctx.fillStyle = beast.state === 'chase' ? '#ff0000' : beast.color;
            ctx.fillRect(beast.x - camera.x, beast.y - camera.y, beast.size, beast.size);
        }

        function loop() { update(); draw(); if (gameRunning) requestAnimationFrame(loop); }
        function startGame() {
            startScreen.style.display = 'none'; gameOverScreen.style.display = 'none';
            initVars(); loop();
        }

    </script>
</body>
</html>
