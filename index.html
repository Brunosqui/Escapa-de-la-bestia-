<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V6 - Sigilo Real!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 10px;
        }
        #gameContainer { position: relative; margin-top: 10px; }
        #gameCanvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; z-index: 10;
        }
        #gameOverScreen { display: none; }
        .screen-overlay h2 { color: #ff4d4d; font-size: 3.5rem; margin: 0 0 10px 0; text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5); }
        .screen-overlay p { font-size: 1.2rem; margin: 5px 0; color: #ccc; }
        .btn {
            margin-top: 20px; padding: 15px 40px; font-size: 1.3rem; font-weight: bold;
            color: white; background-color: #4facf7; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { background-color: #2b8cd6; transform: scale(1.05); }
        .btn-start { background-color: #28a745; }
        .btn-start:hover { background-color: #218838; }
        .header-stats {
            display: flex; gap: 20px; font-size: 1.1rem; background: #222;
            padding: 10px 20px; border-radius: 10px; border: 1px solid #444; align-items: center;
        }
        .stats { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-stats">
        <span>Puntos: <span id="scoreDisplay" class="stats">0</span></span>
        <span>Récord: <span id="highScoreDisplay" class="stats">0</span></span>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="startScreen" class="screen-overlay">
            <h2>Las Ruinas</h2>
            <p>Escóndete detrás de los muros para cortar su visión.</p>
            <p><strong>WASD o Flechas:</strong> Moverse</p>
            <button class="btn btn-start" onclick="startGame()">¡Entrar a las ruinas!</button>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h2>¡CAZADO!</h2>
            <p>Conseguiste <span id="finalScore" class="stats"></span> puntos.</p>
            <p id="newRecordMsg" style="color:#ffd700; display:none; font-weight:bold;">¡NUEVO RÉCORD! 🎉</p>
            <button class="btn" onclick="startGame()">Volver a Intentar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const newRecordMsg = document.getElementById('newRecordMsg');

        let player, beast, coin, score, gameRunning, keys;
        let highScore = localStorage.getItem('bestiaHighScore') || 0;
        highScoreEl.innerText = highScore;

        const obstacles = [
            { x: 100, y: 100, w: 300, h: 25 }, { x: 550, y: 100, w: 350, h: 25 },
            { x: 100, y: 100, w: 25, h: 200 }, { x: 250, y: 250, w: 200, h: 25 },
            { x: 425, y: 250, w: 25, h: 150 }, { x: 700, y: 250, w: 200, h: 25 },
            { x: 875, y: 250, w: 25, h: 250 }, { x: 200, y: 500, w: 80, h: 80 },
            { x: 500, y: 450, w: 40, h: 150 }, { x: 100, y: 600, w: 400, h: 25 },
            { x: 650, y: 600, w: 200, h: 25 }
        ];

        const bushes = [
            { x: 130, y: 130, w: 100, h: 100 }, { x: 750, y: 300, w: 120, h: 80 },
            { x: 350, y: 500, w: 100, h: 90 }
        ];

        function initVars() {
            // Jugador ligeramente más lento para mejor control (antes 5, ahora 4)
            player = { x: 50, y: 50, size: 20, speed: 4, color: '#4facf7', isHidden: false };
            beast = { 
                x: 900, y: 600, size: 25, speed: 2.3, color: '#ff4d4d', 
                state: 'wander', visionRadius: 280, wanderAngle: Math.random() * Math.PI * 2 
            };
            coin = { x: 0, y: 0, size: 15, color: '#ffd700' };
            score = 0; scoreEl.innerText = score; keys = {};
            spawnCoin();
        }

        // Permitir WASD y Flechas convirtiendo a minúsculas
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function isColliding(newX, newY, size) {
            if (newX < 0 || newX + size > canvas.width || newY < 0 || newY + size > canvas.height) return true;
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x && newY < obs.y + obs.h && newY + size > obs.y) return true;
            }
            return false;
        }

        // Nueva función: Comprueba si hay línea de visión clara sin muros
        function hasLineOfSight(bx, by, px, py) {
            let dx = px - bx;
            let dy = py - by;
            let distance = Math.sqrt(dx*dx + dy*dy);
            let steps = distance / 5; // Analiza la línea cada 5 píxeles

            for (let i = 1; i < steps; i++) {
                let cx = bx + (dx * i / steps);
                let cy = by + (dy * i / steps);
                for (let obs of obstacles) {
                    if (cx >= obs.x && cx <= obs.x + obs.w && cy >= obs.y && cy <= obs.y + obs.h) {
                        return false; // Un muro bloquea la visión
                    }
                }
            }
            return true; // Visión libre
        }

        function spawnCoin() {
            let valid = false;
            while (!valid) {
                coin.x = Math.random() * (canvas.width - coin.size);
                coin.y = Math.random() * (canvas.height - coin.size);
                if (!isColliding(coin.x, coin.y, coin.size)) valid = true;
            }
        }

        function update() {
            if (!gameRunning) return;

            // Movimiento fluido con WASD o Flechas
            let nextX = player.x;
            if (keys['arrowleft'] || keys['a']) nextX -= player.speed;
            if (keys['arrowright'] || keys['d']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;

            let nextY = player.y;
            if (keys['arrowup'] || keys['w']) nextY -= player.speed;
            if (keys['arrowdown'] || keys['s']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            let pCenterX = player.x + player.size / 2;
            let pCenterY = player.y + player.size / 2;
            
            // Arbustos
            player.isHidden = false;
            for (let b of bushes) {
                if (pCenterX > b.x && pCenterX < b.x + b.w && pCenterY > b.y && pCenterY < b.y + b.h) {
                    player.isHidden = true;
                }
            }

            // Recolección de monedas mejorada (hitbox más grande/imán)
            let cCenterX = coin.x + coin.size / 2;
            let cCenterY = coin.y + coin.size / 2;
            let distToCoin = Math.sqrt(Math.pow(pCenterX - cCenterX, 2) + Math.pow(pCenterY - cCenterY, 2));
            
            if (distToCoin < (player.size/2 + coin.size/2 + 10)) { // +10 de radio extra
                score += 10;
                scoreEl.innerText = score;
                spawnCoin();
                beast.speed += 0.05;
            }

            // Inteligencia de la Bestia
            let bCenterX = beast.x + beast.size / 2;
            let bCenterY = beast.y + beast.size / 2;
            let dX = player.x - beast.x;
            let dY = player.y - beast.y;
            let distanceToPlayer = Math.sqrt(dX * dX + dY * dY);

            // Verifica si te puede ver (dentro de radio + no escondido + sin muros en medio)
            let canSeePlayer = distanceToPlayer < beast.visionRadius && !player.isHidden && hasLineOfSight(bCenterX, bCenterY, pCenterX, pCenterY);

            if (beast.state === 'wander') {
                if (canSeePlayer) {
                    beast.state = 'chase'; // ¡Te vio!
                } else {
                    let moveX = Math.cos(beast.wanderAngle) * (beast.speed * 0.6);
                    let moveY = Math.sin(beast.wanderAngle) * (beast.speed * 0.6);
                    let hitWall = false;
                    
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX; else hitWall = true;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY; else hitWall = true;

                    if (hitWall || Math.random() < 0.01) beast.wanderAngle = Math.random() * Math.PI * 2;
                }
            } else if (beast.state === 'chase') {
                if (!canSeePlayer && distanceToPlayer > beast.visionRadius * 1.5) {
                    beast.state = 'wander'; // Te perdió el rastro
                    beast.wanderAngle = Math.random() * Math.PI * 2;
                } else if (canSeePlayer) {
                    let moveX = (dX / distanceToPlayer) * beast.speed;
                    let moveY = (dY / distanceToPlayer) * beast.speed;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY;
                }
            }

            // Game Over
            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                gameRunning = false;
                finalScoreEl.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('bestiaHighScore', highScore);
                    highScoreEl.innerText = highScore;
                    newRecordMsg.style.display = 'block';
                } else newRecordMsg.style.display = 'none';
                gameOverScreen.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1e5e2f'; // Arbustos
            for (let b of bushes) ctx.fillRect(b.x, b.y, b.w, b.h);

            ctx.fillStyle = '#555555'; // Muros
            for (let obs of obstacles) ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            ctx.fillStyle = coin.color; // Moneda
            ctx.fillRect(coin.x, coin.y, coin.size, coin.size);

            ctx.globalAlpha = player.isHidden ? 0.3 : 1.0;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.globalAlpha = 1.0;

            // Bestia (Más terrorífica sin mostrar el círculo, solo cambia de rojo oscuro a rojo sangre)
            ctx.fillStyle = beast.state === 'chase' ? '#ff0000' : '#883333';
            ctx.fillRect(beast.x, beast.y, beast.size, beast.size);
        }

        function loop() { update(); draw(); if (gameRunning) requestAnimationFrame(loop); }
        function startGame() {
            startScreen.style.display = 'none'; gameOverScreen.style.display = 'none';
            initVars(); gameRunning = true; loop();
        }

        initVars(); draw();
    </script>
</body>
</html>
