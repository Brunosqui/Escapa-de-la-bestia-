<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V3!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 20px;
        }
        #gameContainer {
            position: relative;
            margin-top: 10px;
        }
        #gameCanvas {
            background-color: #333333;
            border: 4px solid #555;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            display: block;
        }
        /* Nueva Interfaz de Game Over */
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #gameOverScreen h2 {
            color: #ff4d4d;
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }
        #gameOverScreen p { font-size: 1.5rem; margin: 10px 0; }
        .btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #4facf7;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2b8cd6; }
        
        h1 { margin: 0; color: #ff4d4d; }
        .stats { color: #ffd700; font-weight: bold; font-size: 1.2rem; }
        .warning { color: #ff4d4d; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>¡Huye de la Bestia! 👹</h1>
    <p>
        Puntos: <span id="scoreDisplay" class="stats">0</span> | 
        Récord: <span id="highScoreDisplay" class="stats">0</span> | 
        Velocidad Bestia: <span id="speedDisplay" class="warning">2.0</span>
    </p>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="gameOverScreen">
            <h2>¡CAZADO!</h2>
            <p>Conseguiste <span id="finalScore" class="stats"></span> puntos.</p>
            <p id="newRecordMsg" style="color:#ffd700; display:none; font-weight:bold;">¡NUEVO RÉCORD! 🎉</p>
            <button class="btn" onclick="resetGame()">Volver a Jugar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const speedEl = document.getElementById('speedDisplay');
        
        // Elementos de la UI
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const newRecordMsg = document.getElementById('newRecordMsg');

        // Variables del juego
        let player, beast, coin, score, gameRunning, keys;
        let highScore = localStorage.getItem('bestiaHighScore') || 0;
        highScoreEl.innerText = highScore;

        // Estructura del mapa
        const obstacles = [
            { x: 150, y: 150, w: 500, h: 30 },
            { x: 150, y: 420, w: 500, h: 30 },
            { x: 385, y: 150, w: 30, h: 300 }
        ];

        // NUEVO: Arbustos
        const bushes = [
            { x: 50, y: 450, w: 120, h: 100 },
            { x: 600, y: 50, w: 150, h: 120 }
        ];

        // Función para inicializar o reiniciar variables
        function initVars() {
            player = { x: 50, y: 50, size: 20, speed: 5, color: '#4facf7', isHidden: false };
            // NERF: Bestia más lenta al iniciar
            beast = { x: 700, y: 500, size: 25, speed: 2.0, color: '#ff4d4d', wanderX: 0, wanderY: 0 };
            coin = { x: 0, y: 0, size: 15, color: '#ffd700' };
            score = 0;
            scoreEl.innerText = score;
            speedEl.innerText = beast.speed.toFixed(1);
            keys = {};
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            newRecordMsg.style.display = 'none';
            spawnCoin();
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function isColliding(newX, newY, size) {
            if (newX < 0 || newX + size > canvas.width || newY < 0 || newY + size > canvas.height) return true;
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x && newY < obs.y + obs.h && newY + size > obs.y) return true;
            }
            return false;
        }

        function spawnCoin() {
            let valid = false;
            while (!valid) {
                coin.x = Math.random() * (canvas.width - coin.size);
                coin.y = Math.random() * (canvas.height - coin.size);
                if (!isColliding(coin.x, coin.y, coin.size)) valid = true;
            }
        }

        function update() {
            if (!gameRunning) return;

            // Movimiento del Jugador
            let nextX = player.x;
            if (keys['ArrowLeft']) nextX -= player.speed;
            if (keys['ArrowRight']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;

            let nextY = player.y;
            if (keys['ArrowUp']) nextY -= player.speed;
            if (keys['ArrowDown']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            // Comprobar si está escondido en un arbusto
            player.isHidden = false;
            let pCenterX = player.x + player.size / 2;
            let pCenterY = player.y + player.size / 2;
            
            for (let b of bushes) {
                if (pCenterX > b.x && pCenterX < b.x + b.w && pCenterY > b.y && pCenterY < b.y + b.h) {
                    player.isHidden = true;
                }
            }

            // Recolectar moneda
            if (player.x < coin.x + coin.size && player.x + player.size > coin.x &&
                player.y < coin.y + coin.size && player.y + player.size > coin.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnCoin();
            }

            // NERF: La velocidad aumenta mucho más lento
            beast.speed += 0.0002; 
            speedEl.innerText = beast.speed.toFixed(1);

            // Inteligencia de la Bestia
            if (!player.isHidden) {
                // Modo Persecución
                let dx = player.x - beast.x;
                let dy = player.y - beast.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    let moveX = (dx / distance) * beast.speed;
                    let moveY = (dy / distance) * beast.speed;

                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY;
                }
            } else {
                // Modo Confundido (Camina al azar más lento)
                if (Math.random() < 0.02) { // Cambia de dirección ocasionalmente
                    beast.wanderX = (Math.random() - 0.5) * beast.speed * 0.5;
                    beast.wanderY = (Math.random() - 0.5) * beast.speed * 0.5;
                }
                if (!isColliding(beast.x + beast.wanderX, beast.y, beast.size)) beast.x += beast.wanderX;
                if (!isColliding(beast.x, beast.y + beast.wanderY, beast.size)) beast.y += beast.wanderY;
            }

            // Game Over
            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                
                gameRunning = false;
                finalScoreEl.innerText = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('bestiaHighScore', highScore);
                    highScoreEl.innerText = highScore;
                    newRecordMsg.style.display = 'block';
                }
                
                gameOverScreen.style.display = 'flex'; // Mostrar la pantalla final
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Arbustos
            ctx.fillStyle = '#228B22'; // Verde bosque
            for (let b of bushes) {
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }

            // Dibujar Muros
            ctx.fillStyle = '#666666';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }

            // Dibujar Moneda
            ctx.fillStyle = coin.color;
            ctx.fillRect(coin.x, coin.y, coin.size, coin.size);

            // Dibujar Jugador (Semi-transparente si está escondido)
            ctx.globalAlpha = player.isHidden ? 0.4 : 1.0;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.globalAlpha = 1.0; // Restaurar opacidad

            // Dibujar Bestia
            ctx.fillStyle = beast.color;
            ctx.fillRect(beast.x, beast.y, beast.size, beast.size);
        }

        function loop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(loop);
        }

        function resetGame() {
            initVars();
            loop();
        }

        // Iniciar todo
        initVars();
        loop();
    </script>
</body>
</html>
