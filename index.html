<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V5 - Sigilo y Magia!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 10px;
        }
        #gameContainer {
            position: relative;
            margin-top: 10px;
        }
        #gameCanvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #gameOverScreen { display: none; }
        
        .screen-overlay h2 {
            color: #ff4d4d;
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }
        .screen-overlay p { font-size: 1.2rem; margin: 5px 0; color: #ccc; }
        
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background-color: #4facf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background-color: #2b8cd6; transform: scale(1.05); }
        .btn-start { background-color: #28a745; }
        .btn-start:hover { background-color: #218838; }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            background: #222;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #444;
            align-items: center;
        }
        .stats { color: #ffd700; font-weight: bold; }
        .magic { color: #a200ff; font-weight: bold; }
        .magic-ready { color: #d400ff; text-shadow: 0 0 8px #d400ff; }
    </style>
</head>
<body>

    <div class="header-stats">
        <span>Puntos: <span id="scoreDisplay" class="stats">0</span></span>
        <span>Récord: <span id="highScoreDisplay" class="stats">0</span></span>
        <span>Dash (Espacio): <span id="dashDisplay" class="magic">LISTO</span></span>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="startScreen" class="screen-overlay">
            <h2>Las Ruinas</h2>
            <p>La bestia deambula ciega... hasta que te acercas.</p>
            <p><strong>Flechas:</strong> Moverse | <strong>Espacio:</strong> Dash Mágico (Atraviesa muros)</p>
            <button class="btn btn-start" onclick="startGame()">¡Jugar Ahora!</button>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h2>¡CAZADO!</h2>
            <p>Conseguiste <span id="finalScore" class="stats"></span> puntos.</p>
            <p id="newRecordMsg" style="color:#ffd700; display:none; font-weight:bold;">¡NUEVO RÉCORD! 🎉</p>
            <button class="btn" onclick="startGame()">Volver a Intentar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const dashEl = document.getElementById('dashDisplay');
        
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const newRecordMsg = document.getElementById('newRecordMsg');

        let player, beast, coin, score, gameRunning, keys;
        let highScore = localStorage.getItem('bestiaHighScore') || 0;
        highScoreEl.innerText = highScore;

        // Variables del Dash Mágico
        let lastDashTime = 0;
        const dashCooldown = 5000; // 5 segundos
        const dashDistance = 150; // Qué tan lejos te teletransportas

        const obstacles = [
            { x: 100, y: 100, w: 300, h: 25 },
            { x: 550, y: 100, w: 350, h: 25 },
            { x: 100, y: 100, w: 25, h: 200 },
            { x: 250, y: 250, w: 200, h: 25 },
            { x: 425, y: 250, w: 25, h: 150 },
            { x: 700, y: 250, w: 200, h: 25 },
            { x: 875, y: 250, w: 25, h: 250 },
            { x: 200, y: 500, w: 80, h: 80 },
            { x: 500, y: 450, w: 40, h: 150 },
            { x: 100, y: 600, w: 400, h: 25 },
            { x: 650, y: 600, w: 200, h: 25 }
        ];

        const bushes = [
            { x: 130, y: 130, w: 100, h: 100 },
            { x: 750, y: 300, w: 120, h: 80 },
            { x: 350, y: 500, w: 100, h: 90 }
        ];

        function initVars() {
            player = { x: 50, y: 50, size: 20, speed: 5, color: '#4facf7', isHidden: false };
            
            // Nueva IA para la bestia
            beast = { 
                x: 900, y: 600, size: 25, speed: 2.2, color: '#ff4d4d', 
                state: 'wander', // 'wander' = deambular, 'chase' = perseguir
                visionRadius: 250, // Distancia para verte
                wanderAngle: Math.random() * Math.PI * 2 // Dirección aleatoria inicial
            };
            
            coin = { x: 0, y: 0, size: 15, color: '#ffd700' };
            score = 0;
            scoreEl.innerText = score;
            lastDashTime = 0;
            keys = {};
            spawnCoin();
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function isColliding(newX, newY, size) {
            if (newX < 0 || newX + size > canvas.width || newY < 0 || newY + size > canvas.height) return true;
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x && newY < obs.y + obs.h && newY + size > obs.y) return true;
            }
            return false;
        }

        function spawnCoin() {
            let valid = false;
            while (!valid) {
                coin.x = Math.random() * (canvas.width - coin.size);
                coin.y = Math.random() * (canvas.height - coin.size);
                if (!isColliding(coin.x, coin.y, coin.size)) valid = true;
            }
        }

        function update() {
            if (!gameRunning) return;
            let now = Date.now();

            // --- SISTEMA DASH MÁGICO ---
            if (keys[' '] && now - lastDashTime > dashCooldown) {
                // Calcular hacia dónde miramos
                let dx = 0; let dy = 0;
                if (keys['ArrowLeft']) dx = -1;
                if (keys['ArrowRight']) dx = 1;
                if (keys['ArrowUp']) dy = -1;
                if (keys['ArrowDown']) dy = 1;

                if (dx !== 0 || dy !== 0) {
                    // Normalizar dirección
                    let length = Math.sqrt(dx*dx + dy*dy);
                    dx /= length; dy /= length;

                    // Intentar teletransportarse (reduciendo distancia si cae dentro de un muro)
                    let dist = dashDistance;
                    let dashSuccess = false;
                    while(dist > 0) {
                        let targetX = player.x + dx * dist;
                        let targetY = player.y + dy * dist;
                        // Si el lugar de aterrizaje está vacío, hacemos el dash
                        if (!isColliding(targetX, targetY, player.size)) {
                            player.x = targetX;
                            player.y = targetY;
                            lastDashTime = now;
                            dashSuccess = true;
                            break;
                        }
                        dist -= 20; // Si choca, intenta caer un poco antes
                    }
                }
            }

            // Actualizar UI del Dash
            let dashRemaining = Math.max(0, dashCooldown - (now - lastDashTime));
            if (dashRemaining === 0) {
                dashEl.innerText = "LISTO";
                dashEl.className = "magic-ready";
            } else {
                dashEl.innerText = (dashRemaining / 1000).toFixed(1) + "s";
                dashEl.className = "magic";
            }

            // --- MOVIMIENTO NORMAL ---
            let nextX = player.x;
            if (keys['ArrowLeft']) nextX -= player.speed;
            if (keys['ArrowRight']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;

            let nextY = player.y;
            if (keys['ArrowUp']) nextY -= player.speed;
            if (keys['ArrowDown']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            // --- ARBUSTOS ---
            player.isHidden = false;
            let pCenterX = player.x + player.size / 2;
            let pCenterY = player.y + player.size / 2;
            for (let b of bushes) {
                if (pCenterX > b.x && pCenterX < b.x + b.w && pCenterY > b.y && pCenterY < b.y + b.h) {
                    player.isHidden = true;
                }
            }

            // --- MONEDAS ---
            if (player.x < coin.x + coin.size && player.x + player.size > coin.x &&
                player.y < coin.y + coin.size && player.y + player.size > coin.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnCoin();
                beast.speed += 0.05; // La bestia se vuelve ligeramente más rápida por cada moneda
            }

            // --- INTELIGENCIA DE LA BESTIA ---
            let dX = player.x - beast.x;
            let dY = player.y - beast.y;
            let distanceToPlayer = Math.sqrt(dX * dX + dY * dY);

            if (beast.state === 'wander') {
                // Si el jugador entra en su rango y no está escondido, empieza a cazar
                if (distanceToPlayer < beast.visionRadius && !player.isHidden) {
                    beast.state = 'chase';
                } else {
                    // Deambular: Moverse en su ángulo actual
                    let moveX = Math.cos(beast.wanderAngle) * (beast.speed * 0.6); // Camina más lento cuando deambula
                    let moveY = Math.sin(beast.wanderAngle) * (beast.speed * 0.6);

                    // Si choca con una pared, cambia de dirección
                    let hitWall = false;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) {
                        beast.x += moveX;
                    } else { hitWall = true; }
                    
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) {
                        beast.y += moveY;
                    } else { hitWall = true; }

                    if (hitWall || Math.random() < 0.01) {
                        beast.wanderAngle = Math.random() * Math.PI * 2; // Gira al azar
                    }
                }
            } else if (beast.state === 'chase') {
                // Si el jugador escapa lejos o se esconde, la bestia pierde el interés
                if (distanceToPlayer > beast.visionRadius * 1.5 || player.isHidden) {
                    beast.state = 'wander';
                    beast.wanderAngle = Math.random() * Math.PI * 2;
                } else {
                    // Cazar: Perseguir directamente
                    let moveX = (dX / distanceToPlayer) * beast.speed;
                    let moveY = (dY / distanceToPlayer) * beast.speed;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY;
                }
            }

            // --- GAME OVER ---
            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                
                gameRunning = false;
                finalScoreEl.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('bestiaHighScore', highScore);
                    highScoreEl.innerText = highScore;
                    newRecordMsg.style.display = 'block';
                } else {
                    newRecordMsg.style.display = 'none';
                }
                gameOverScreen.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Arbustos
            ctx.fillStyle = '#1e5e2f';
            for (let b of bushes) ctx.fillRect(b.x, b.y, b.w, b.h);

            // Muros
            ctx.fillStyle = '#555555';
            for (let obs of obstacles) ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Moneda
            ctx.fillStyle = coin.color;
            ctx.fillRect(coin.x, coin.y, coin.size, coin.size);

            // Jugador
            ctx.globalAlpha = player.isHidden ? 0.3 : 1.0;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.globalAlpha = 1.0;

            // Rango de Visión de la Bestia (Círculo semi-transparente)
            ctx.beginPath();
            ctx.arc(beast.x + beast.size/2, beast.y + beast.size/2, beast.visionRadius, 0, Math.PI * 2);
            // Si está cazando el círculo es rojo brillante, si deambula es blanco suave
            ctx.fillStyle = beast.state === 'chase' ? 'rgba(255, 0, 0, 0.15)' : 'rgba(255, 255, 255, 0.05)';
            ctx.fill();

            // Bestia (Se vuelve más oscura si está tranquila, roja si persigue)
            ctx.fillStyle = beast.state === 'chase' ? '#ff1111' : '#883333';
            ctx.fillRect(beast.x, beast.y, beast.size, beast.size);
        }

        function loop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(loop);
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            initVars();
            gameRunning = true;
            loop();
        }

        initVars();
        draw();
    </script>
</body>
</html>
