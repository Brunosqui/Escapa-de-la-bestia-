<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V2!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 20px;
        }
        #gameCanvas {
            background-color: #333333;
            border: 4px solid #555;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            margin-top: 10px;
        }
        h1 { margin: 0; color: #ff4d4d; }
        p { font-size: 1.2rem; margin: 10px 0; }
        .stats { color: #ffd700; font-weight: bold; }
        .warning { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <h1>¡Huye de la Bestia! 👹</h1>
    <p>
        Puntos: <span id="scoreDisplay" class="stats">0</span> | 
        Récord: <span id="highScoreDisplay" class="stats">0</span> | 
        Velocidad Bestia: <span id="speedDisplay" class="warning">3.5</span>
    </p>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const speedEl = document.getElementById('speedDisplay');

        // Entidades
        let player = { x: 50, y: 50, size: 20, speed: 5, color: '#4facf7' };
        let beast = { x: 700, y: 500, size: 25, speed: 3.5, color: '#ff4d4d' };
        let coin = { x: 0, y: 0, size: 15, color: '#ffd700' };

        // Puntuación
        let score = 0;
        // Leer el récord de la memoria del navegador. Si no hay, es 0.
        let highScore = localStorage.getItem('bestiaHighScore') || 0;
        highScoreEl.innerText = highScore;

        // Nuevos obstáculos para el mapa grande
        const obstacles = [
            { x: 150, y: 150, w: 500, h: 30 }, // Muro superior
            { x: 150, y: 420, w: 500, h: 30 }, // Muro inferior
            { x: 385, y: 150, w: 30, h: 300 }  // Muro central vertical
        ];

        let keys = {};
        let gameRunning = true;

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Función de colisión mejorada (sirve para jugador, bestia y monedas)
        function isColliding(newX, newY, size) {
            // Chocar con los bordes del mapa
            if (newX < 0 || newX + size > canvas.width || 
                newY < 0 || newY + size > canvas.height) {
                return true;
            }
            // Chocar con obstáculos
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x &&
                    newY < obs.y + obs.h && newY + size > obs.y) {
                    return true;
                }
            }
            return false;
        }

        // Función para aparecer la moneda en un lugar libre
        function spawnCoin() {
            let validPosition = false;
            while (!validPosition) {
                coin.x = Math.random() * (canvas.width - coin.size);
                coin.y = Math.random() * (canvas.height - coin.size);
                // Si la posición de la moneda no choca con ningún muro, es válida
                if (!isColliding(coin.x, coin.y, coin.size)) {
                    validPosition = true;
                }
            }
        }
        spawnCoin(); // Aparecer la primera moneda al iniciar

        function update() {
            if (!gameRunning) return;

            // --- MOVIMIENTO DEL JUGADOR ---
            let nextX = player.x;
            if (keys['ArrowLeft']) nextX -= player.speed;
            if (keys['ArrowRight']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;

            let nextY = player.y;
            if (keys['ArrowUp']) nextY -= player.speed;
            if (keys['ArrowDown']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            // --- RECOLECTAR MONEDA ---
            if (player.x < coin.x + coin.size && player.x + player.size > coin.x &&
                player.y < coin.y + coin.size && player.y + player.size > coin.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnCoin(); // Aparecer nueva moneda
            }

            // --- DIFICULTAD ---
            beast.speed += 0.001; 
            speedEl.innerText = beast.speed.toFixed(1);

            // --- INTELIGENCIA DE LA BESTIA ---
            let dx = player.x - beast.x;
            let dy = player.y - beast.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 0) {
                let moveX = (dx / distance) * beast.speed;
                let moveY = (dy / distance) * beast.speed;

                // Intentar moverse en X. Si no choca, se mueve.
                if (!isColliding(beast.x + moveX, beast.y, beast.size)) {
                    beast.x += moveX;
                }
                // Intentar moverse en Y por separado. Esto permite que se "deslice".
                if (!isColliding(beast.x, beast.y + moveY, beast.size)) {
                    beast.y += moveY;
                }
            }

            // --- GAME OVER ---
            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                gameRunning = false;
                
                // Guardar récord si superaste el anterior
                if (score > highScore) {
                    localStorage.setItem('bestiaHighScore', score);
                    alert(`¡NUEVO RÉCORD! Lograste ${score} puntos. 🎉`);
                } else {
                    alert(`¡Te atrapó! Puntos: ${score}. Récord actual: ${highScore} 👹`);
                }
                location.reload(); 
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Muros
            ctx.fillStyle = '#666666';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }

            // Dibujar Moneda
            ctx.fillStyle = coin.color;
            ctx.fillRect(coin.x, coin.y, coin.size, coin.size);

            // Dibujar Jugador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Dibujar Bestia
            ctx.fillStyle = beast.color;
            ctx.fillRect(beast.x, beast.y, beast.size, beast.size);
        }

        function loop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
</html>
