<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Escapa de la Bestia V4!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 10px;
        }
        #gameContainer {
            position: relative;
            margin-top: 10px;
        }
        #gameCanvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        /* Interfaz de Pantallas (Inicio y Game Over) */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #gameOverScreen { display: none; } /* Oculto al inicio */
        
        .screen-overlay h2 {
            color: #ff4d4d;
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .screen-overlay p { font-size: 1.5rem; margin: 10px 0; color: #ccc; }
        
        .btn {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background-color: #4facf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background-color: #2b8cd6; transform: scale(1.05); }
        .btn-start { background-color: #28a745; }
        .btn-start:hover { background-color: #218838; }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            background: #222;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #444;
        }
        .stats { color: #ffd700; font-weight: bold; }
        .warning { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-stats">
        <span>Puntos: <span id="scoreDisplay" class="stats">0</span></span>
        <span>Récord: <span id="highScoreDisplay" class="stats">0</span></span>
        <span>Velocidad Bestia: <span id="speedDisplay" class="warning">2.0</span></span>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="startScreen" class="screen-overlay">
            <h2>Las Ruinas</h2>
            <p>Sobrevive a la bestia. Escóndete en los arbustos.</p>
            <p>Usa las flechas del teclado para moverte.</p>
            <button class="btn btn-start" onclick="startGame()">¡Jugar Ahora!</button>
        </div>

        <div id="gameOverScreen" class="screen-overlay">
            <h2>¡CAZADO!</h2>
            <p>Conseguiste <span id="finalScore" class="stats"></span> puntos.</p>
            <p id="newRecordMsg" style="color:#ffd700; display:none; font-weight:bold;">¡NUEVO RÉCORD! 🎉</p>
            <button class="btn" onclick="startGame()">Volver a Intentar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScoreDisplay');
        const speedEl = document.getElementById('speedDisplay');
        
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const newRecordMsg = document.getElementById('newRecordMsg');

        let player, beast, coin, score, gameRunning, keys;
        let highScore = localStorage.getItem('bestiaHighScore') || 0;
        highScoreEl.innerText = highScore;

        // MAPA DE RUINAS (Paredes rotas, laberintos y zonas abiertas)
        const obstacles = [
            // Borde superior roto
            { x: 100, y: 100, w: 300, h: 25 },
            { x: 550, y: 100, w: 350, h: 25 },
            // Muros en forma de "L" y "C" para crear callejones
            { x: 100, y: 100, w: 25, h: 200 },
            { x: 250, y: 250, w: 200, h: 25 },
            { x: 425, y: 250, w: 25, h: 150 },
            { x: 700, y: 250, w: 200, h: 25 },
            { x: 875, y: 250, w: 25, h: 250 },
            // Columnas o bloques sueltos
            { x: 200, y: 500, w: 80, h: 80 },
            { x: 500, y: 450, w: 40, h: 150 },
            // Borde inferior roto
            { x: 100, y: 600, w: 400, h: 25 },
            { x: 650, y: 600, w: 200, h: 25 }
        ];

        // Arbustos esparcidos por las ruinas
        const bushes = [
            { x: 130, y: 130, w: 100, h: 100 },
            { x: 750, y: 300, w: 120, h: 80 },
            { x: 350, y: 500, w: 100, h: 90 }
        ];

        function initVars() {
            player = { x: 50, y: 50, size: 20, speed: 5, color: '#4facf7', isHidden: false };
            // La bestia aparece lejos, en la esquina inferior derecha
            beast = { x: 900, y: 600, size: 25, speed: 2.0, color: '#ff4d4d', wanderX: 0, wanderY: 0 };
            coin = { x: 0, y: 0, size: 15, color: '#ffd700' };
            score = 0;
            scoreEl.innerText = score;
            speedEl.innerText = beast.speed.toFixed(1);
            keys = {};
            spawnCoin();
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function isColliding(newX, newY, size) {
            if (newX < 0 || newX + size > canvas.width || newY < 0 || newY + size > canvas.height) return true;
            for (let obs of obstacles) {
                if (newX < obs.x + obs.w && newX + size > obs.x && newY < obs.y + obs.h && newY + size > obs.y) return true;
            }
            return false;
        }

        function spawnCoin() {
            let valid = false;
            while (!valid) {
                coin.x = Math.random() * (canvas.width - coin.size);
                coin.y = Math.random() * (canvas.height - coin.size);
                if (!isColliding(coin.x, coin.y, coin.size)) valid = true;
            }
        }

        function update() {
            if (!gameRunning) return;

            let nextX = player.x;
            if (keys['ArrowLeft']) nextX -= player.speed;
            if (keys['ArrowRight']) nextX += player.speed;
            if (!isColliding(nextX, player.y, player.size)) player.x = nextX;

            let nextY = player.y;
            if (keys['ArrowUp']) nextY -= player.speed;
            if (keys['ArrowDown']) nextY += player.speed;
            if (!isColliding(player.x, nextY, player.size)) player.y = nextY;

            player.isHidden = false;
            let pCenterX = player.x + player.size / 2;
            let pCenterY = player.y + player.size / 2;
            
            for (let b of bushes) {
                if (pCenterX > b.x && pCenterX < b.x + b.w && pCenterY > b.y && pCenterY < b.y + b.h) {
                    player.isHidden = true;
                }
            }

            if (player.x < coin.x + coin.size && player.x + player.size > coin.x &&
                player.y < coin.y + coin.size && player.y + player.size > coin.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnCoin();
            }

            beast.speed += 0.0002; 
            speedEl.innerText = beast.speed.toFixed(1);

            if (!player.isHidden) {
                let dx = player.x - beast.x;
                let dy = player.y - beast.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    let moveX = (dx / distance) * beast.speed;
                    let moveY = (dy / distance) * beast.speed;
                    if (!isColliding(beast.x + moveX, beast.y, beast.size)) beast.x += moveX;
                    if (!isColliding(beast.x, beast.y + moveY, beast.size)) beast.y += moveY;
                }
            } else {
                if (Math.random() < 0.02) {
                    beast.wanderX = (Math.random() - 0.5) * beast.speed * 0.5;
                    beast.wanderY = (Math.random() - 0.5) * beast.speed * 0.5;
                }
                if (!isColliding(beast.x + beast.wanderX, beast.y, beast.size)) beast.x += beast.wanderX;
                if (!isColliding(beast.x, beast.y + beast.wanderY, beast.size)) beast.y += beast.wanderY;
            }

            if (player.x < beast.x + beast.size && player.x + player.size > beast.x &&
                player.y < beast.y + beast.size && player.y + player.size > beast.y) {
                
                gameRunning = false;
                finalScoreEl.innerText = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('bestiaHighScore', highScore);
                    highScoreEl.innerText = highScore;
                    newRecordMsg.style.display = 'block';
                } else {
                    newRecordMsg.style.display = 'none';
                }
                
                gameOverScreen.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Arbustos
            ctx.fillStyle = '#1e5e2f';
            for (let b of bushes) ctx.fillRect(b.x, b.y, b.w, b.h);

            // Muros (Ruinas)
            ctx.fillStyle = '#555555';
            for (let obs of obstacles) ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Moneda
            ctx.fillStyle = coin.color;
            ctx.fillRect(coin.x, coin.y, coin.size, coin.size);

            // Jugador
            ctx.globalAlpha = player.isHidden ? 0.3 : 1.0;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.globalAlpha = 1.0;

            // Bestia
            ctx.fillStyle = beast.color;
            ctx.fillRect(beast.x, beast.y, beast.size, beast.size);
        }

        function loop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(loop);
        }

        // Función que se llama al pulsar el botón "Jugar"
        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            initVars();
            gameRunning = true;
            loop();
        }

        // Solo dibujamos el estado inicial, pero no corremos el "update" aún
        initVars();
        draw();
    </script>
</body>
</html>
